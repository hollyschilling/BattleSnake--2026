# Apache virtual host for the BattleSnake server.
#
# Document root is public/ ONLY — repo source (src/, spec/, composer.json,
# CLAUDE.md, ...) is never web-accessible. The front-controller rewrite is
# baked into the vhost, so no .htaccess / AllowOverride is required.
#
# Listens on 8080 to match DigitalOcean App Platform's default http_port.

<VirtualHost *:8080>
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted

        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteRule ^ index.php [QSA,L]
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
